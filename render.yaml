services:
  - type: web
    name: daybyday-kiwi-service
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn kiwi_server.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
